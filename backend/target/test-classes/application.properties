# ============================================
# Perfil E2E - Backend con H2 en memoria
# ============================================
# Permite levantar la API para las pruebas end-to-end de Playwright sin
# depender de Docker/PostgreSQL. Uso:
#   cd backend && SPRING_PROFILES_ACTIVE=e2e ./mvnw spring-boot:test-run
# (el goal test-run usa el classpath de test, donde esta la dependencia H2)

spring.datasource.url=jdbc:h2:mem:hospital;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Reutiliza los mismos scripts schema.sql y data.sql del proyecto
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql