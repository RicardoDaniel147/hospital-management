name: CI

# CI/CD del Hospital Management System
# Ejecuta pruebas y analisis estatico en cada push y pull request.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  backend-tests:
    name: Backend - Pruebas unitarias (JUnit + Mockito) y cobertura
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas con cobertura (JaCoCo)
        run: mvn -B test jacoco:report

      - name: Publicar reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: backend/target/site/jacoco/

  frontend-tests:
    name: Frontend - Jest y ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Analisis estatico (ESLint)
        run: npm run lint

      - name: Pruebas unitarias (Jest)
        run: npm test

  frontend-e2e:
    name: Frontend - Pruebas E2E (Playwright + backend H2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Instalar navegadores de Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Ejecutar pruebas E2E (Playwright levanta backend H2 + frontend)
        working-directory: frontend
        run: npx playwright test

      - name: Publicar reporte de Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/